<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Extractor Studio v7.0 - Engineering Suite</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <!-- Mammoth.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <!-- Marked.js for Markdown rendering in AI analysis -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        slate: { 850: '#1e293b', 900: '#0f172a' }
                    },
                    animation: {
                        'gradient-x': 'gradient-x 3s ease infinite',
                    },
                    keyframes: {
                        'gradient-x': {
                            '0%, 100%': {
                                'background-size': '200% 200%',
                                'background-position': 'left center'
                            },
                            '50%': {
                                'background-size': '200% 200%',
                                'background-position': 'right center'
                            },
                        },
                    }
                }
            }
        }
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>

    <style>
        /* Scrollbar personalizada */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .highlight-match {
            background-color: rgba(250, 204, 21, 0.3);
            border-bottom: 2px solid #eab308;
            color: #0f172a;
            font-weight: 700;
            padding: 0 2px;
            border-radius: 2px;
            transition: all 0.2s;
        }

        #editor-area:focus { outline: none; }

        /* Markdown Styles for AI Output */
        .prose h1 { font-size: 1.5em; font-weight: bold; margin-bottom: 0.5em; color: #1e293b; }
        .prose h2 { font-size: 1.25em; font-weight: bold; margin-top: 1em; margin-bottom: 0.5em; color: #334155; }
        .prose h3 { font-size: 1.1em; font-weight: bold; margin-top: 1em; color: #475569; }
        .prose ul { list-style-type: disc; padding-left: 1.5em; margin-bottom: 1em; }
        .prose ol { list-style-type: decimal; padding-left: 1.5em; margin-bottom: 1em; }
        .prose p { margin-bottom: 1em; line-height: 1.6; }
        .prose code { background: #f1f5f9; padding: 2px 4px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 0.9em; color: #d946ef; }
        .prose pre { background: #1e293b; color: #e2e8f0; padding: 1em; border-radius: 8px; overflow-x: auto; margin-bottom: 1em; border: 1px solid #334155; }
        .prose pre code { background: transparent; color: inherit; padding: 0; }
        .prose blockquote { border-left: 4px solid #cbd5e1; padding-left: 1em; color: #64748b; font-style: italic; }

        /* Sparkle Button Effect */
        .btn-sparkle {
            background: linear-gradient(90deg, #4f46e5, #7c3aed, #2563eb);
            background-size: 200% auto;
            animation: gradient-x 3s ease infinite;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-sparkle:hover {
            background-position: right center;
            box-shadow: 0 0 15px rgba(124, 58, 237, 0.5);
        }
    </style>
</head>
<body class="bg-gray-100 h-screen flex overflow-hidden text-slate-800">

        <!-- Logo Area -->
        <div class="p-6 border-b border-slate-800 bg-slate-950">
            <div class="flex items-center gap-3">
                <div class="bg-gradient-to-tr from-indigo-500 to-purple-600 p-2 rounded-lg shadow-lg">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                </div>
                <div>
                    <h1 class="font-bold text-lg tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-white to-slate-400">PromptStudio</h1>
                    <p class="text-[10px] text-indigo-400 tracking-wider uppercase font-bold">Engineering Suite v7</p>
                </div>
            </div>
        </div>

        <!-- Controles -->
        <div class="flex-1 overflow-y-auto p-5 space-y-6">

            <!-- 1. Upload -->
            <div class="space-y-3">
                <label class="text-xs font-bold uppercase tracking-wider text-slate-400 flex justify-between items-center">
                    <span>1. Origen</span>

                </label>
                <div class="relative group">

                        <div class="flex flex-col items-center gap-2">
                            <svg class="w-6 h-6 text-slate-500 group-hover:text-indigo-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                            <div>
                                <p class="text-xs text-slate-300 font-medium truncate max-w-[180px]" id="drop-text">Arrastra archivo aquí</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 2. AI Suite (Gemini) -->
            <div class="space-y-3">
                <label class="text-xs font-bold uppercase tracking-wider text-indigo-300 flex items-center gap-2">
                    <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
                    2. Gemini AI Tools
                </label>

                <!-- Main Extract -->
                <button onclick="handleAIExtract()" class="w-full btn-sparkle text-white text-xs font-bold py-3 px-3 rounded-lg shadow-lg flex items-center justify-center gap-2 transition-transform active:scale-95 group mb-4">
                    <svg class="w-4 h-4 group-hover:animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    ✨ AI Auto-Extract
                </button>

                <!-- Refine Tools -->
                <div class="space-y-2">
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Refinar & Analizar</p>
                    <div class="flex gap-2">
                        <button onclick="handleAIOptimize()" class="flex-1 bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-200 text-xs font-semibold py-2 rounded-lg transition-colors flex items-center justify-center gap-1 group">
                            <span class="group-hover:text-indigo-400 transition-colors">⚡</span> Optimizar
                        </button>
                        <button onclick="handleAICritique()" class="flex-1 bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-200 text-xs font-semibold py-2 rounded-lg transition-colors flex items-center justify-center gap-1 group">
                            <span class="group-hover:text-pink-400 transition-colors">🧐</span> Auditar
                        </button>
                    </div>
                </div>

                <!-- Generation Tools (NEW) -->
                <div class="space-y-2 pt-2 border-t border-slate-800/50">
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Generadores</p>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="handleAIGenerateTests()" class="bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-200 text-xs font-semibold py-2 rounded-lg transition-colors flex items-center justify-center gap-1 group" title="Generar casos de prueba para verificar el prompt">

                        <button onclick="handleAIGenerateFewShot()" class="bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-200 text-xs font-semibold py-2 rounded-lg transition-colors flex items-center justify-center gap-1 group" title="Generar ejemplos input/output para el prompt">
                            <span class="group-hover:text-amber-400 transition-colors">📚</span> Few-Shot
                        </button>
                    </div>

            </div>

            <!-- 3. Manual Tools (Collapsed/Smaller) -->
            <div class="space-y-2 pt-4 border-t border-slate-800">
                <details class="group">
                    <summary class="list-none flex justify-between items-center cursor-pointer text-xs font-bold uppercase tracking-wider text-slate-500 hover:text-slate-300 transition-colors">
                        <span>3. Herramientas Manuales</span>
                        <span class="transition group-open:rotate-180">

                        <button onclick="processContent()" class="w-full py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs font-bold rounded-lg border border-slate-700 transition-colors">
                            🔍 Buscar (Regex)

                    </div>
                </details>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col bg-white h-full relative z-0">

        <!-- Toolbar Superior -->
        <header class="h-14 border-b border-gray-200 bg-white flex items-center justify-between px-6 shrink-0 z-10">
            <div class="flex items-center gap-4 text-sm text-gray-500">
                <div class="flex items-center gap-2" title="Est. Tokens">
                    <svg class="w-4 h-4 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                    <span id="token-count" class="font-mono font-bold text-gray-800">0</span> <span class="text-xs">tok</span>
                </div>
                <div class="h-4 w-px bg-gray-300"></div>
                <div class="flex items-center gap-2" title="Coincidencias Regex">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    <span id="match-count" class="font-mono font-bold text-gray-800">0</span>
                </div>
            </div>

            <div class="flex items-center gap-2">
                 <button onclick="cleanText()" class="text-xs font-medium text-gray-600 hover:text-indigo-600 px-3 py-1.5 rounded hover:bg-indigo-50 transition flex items-center gap-1 border border-transparent hover:border-indigo-100">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                    Fix Format
                </button>
                <div class="h-4 w-px bg-gray-300 mx-1"></div>
                <button onclick="copyToClipboard()" class="text-xs font-bold text-gray-700 hover:text-gray-900 px-3 py-1.5 rounded hover:bg-gray-100 transition flex items-center gap-1">
                    Copiar
                </button>
                <button onclick="downloadMarkdown()" class="bg-gray-900 hover:bg-black text-white text-xs font-bold px-4 py-2 rounded shadow transition flex items-center gap-2">
                    Exportar .MD
                </button>
            </div>

        <!-- Editor Area -->
        <div class="flex-1 overflow-hidden relative bg-gray-50 flex justify-center">

                    <div class="relative">

                        <div class="w-12 h-12 border-4 border-indigo-600 rounded-full border-t-transparent animate-spin absolute top-0 left-0"></div>
                    </div>
                    <span id="loading-text" class="text-sm font-bold text-gray-700 mt-4 animate-pulse">Procesando con Gemini AI...</span>
                </div>

                <!-- Editable Content -->
                <div id="editor-area" contenteditable="true" spellcheck="false"
                    class="flex-1 p-8 sm:p-12 overflow-y-auto font-mono text-sm leading-relaxed text-slate-800 outline-none whitespace-pre-wrap selection:bg-indigo-100 selection:text-indigo-900">
                    <div class="h-full flex flex-col items-center justify-center text-gray-300 select-none">
                        <svg class="w-16 h-16 mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        <p class="text-lg font-medium">Arrastra un documento para comenzar</p>

                    </div>
                </div>

    <!-- Modal para Análisis AI -->
    <div id="ai-modal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity" onclick="closeModal()"></div>
        <div class="absolute inset-0 flex items-center justify-center p-4">
            <div class="bg-white rounded-xl shadow-2xl w-full max-w-2xl max-h-[85vh] flex flex-col transform transition-all scale-100 border border-white/20">
                <!-- Header del Modal -->
                <div id="modal-header" class="p-5 border-b border-gray-100 flex justify-between items-center bg-gray-50 rounded-t-xl">
                    <h3 id="modal-title" class="font-bold text-lg text-gray-800 flex items-center gap-2">
                        <span class="text-2xl">🧐</span> Análisis de Prompt
                    </h3>
                    <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 transition-colors p-1 rounded-full hover:bg-gray-200">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>

                <!-- Contenido del Modal -->
                <div id="modal-content" class="p-6 overflow-y-auto prose prose-sm max-w-none text-gray-600 bg-white">
                    <!-- Contenido Markdown generado por AI aquí -->
                </div>

                <!-- Footer del Modal -->
                <div class="p-4 border-t border-gray-100 flex justify-end gap-2 bg-gray-50 rounded-b-xl">
                    <button onclick="closeModal()" class="px-4 py-2 text-sm font-medium text-gray-600 hover:bg-gray-200 rounded-lg transition-colors">Cerrar</button>
                    <button onclick="copyModalContent()" class="px-4 py-2 text-sm font-bold text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg shadow transition-transform active:scale-95">Copiar Resultado</button>
                </div>
            </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-6 right-6 bg-slate-800 text-white px-5 py-3 rounded-lg shadow-xl text-sm font-medium transform translate-y-20 opacity-0 transition-all duration-300 z-50 flex items-center gap-3 border border-slate-700">
        <span id="toast-icon">✨</span>
        <span id="toast-msg">Notificación</span>
    </div>

    <script>
        // === Configuración API ===
        let apiKey = localStorage.getItem('gemini_api_key') || "";

        // === Configuración de Presets (Legacy) ===
        const PRESETS = {
            system: ["System Prompt:", "You are a helpful AI assistant specialized in prompt engineering."],
        };

        // === Estado ===
        let currentFile = { name: "Untitled", content: "" };
        let originalDocContent = ""; // Stores full doc for AI context

        // === Inicialización ===
        document.addEventListener('DOMContentLoaded', () => {
            const fileInput = document.getElementById('file-upload');
            const dropZone = document.getElementById('drop-zone');

            // File Input Change
            fileInput.addEventListener('change', handleFileUpload);

            // Drag & Drop
            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.classList.add('border-indigo-500', 'bg-slate-800');
            });

            dropZone.addEventListener('dragleave', (e) => {
                e.preventDefault();
                dropZone.classList.remove('border-indigo-500', 'bg-slate-800');
            });

            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('border-indigo-500', 'bg-slate-800');
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    handleFile(files[0]);
                }
            });

            // Check for API Key
            if (!apiKey) {
               setTimeout(promptApiKey, 1000);
            }
        });

        // === File Handling ===
        async function handleFileUpload(event) {
            const file = event.target.files[0];
            if (file) handleFile(file);
        }

        async function handleFile(file) {
            const dropText = document.getElementById('drop-text');
            const originalText = "Arrastra archivo aquí"; // Default text
            dropText.textContent = `Procesando ${file.name}...`;

            // Show loading overlay
            document.getElementById('loading-overlay').classList.remove('hidden');
            document.getElementById('loading-text').textContent = "Leyendo documento...";

            try {
                let text = "";
                if (file.type === "application/pdf") {
                    text = await parsePDF(file);
                } else if (file.type === "application/vnd.openxmlformats-officedocument.wordprocessingml.document") {
                    text = await parseDOCX(file);
                } else {
                    text = await readFileAsText(file);
                }

                currentFile = { name: file.name, content: text };
                originalDocContent = text;
                updateEditor(text);

                document.getElementById('file-status').classList.remove('hidden');
                dropText.textContent = file.name;

                showToast("Archivo cargado exitosamente", "✓");
            } catch (err) {
                console.error(err);
                dropText.textContent = "Error";
                showToast("Error al leer archivo: " + err.message, "❌");
                setTimeout(() => dropText.textContent = originalText, 2000);
            } finally {
                document.getElementById('loading-overlay').classList.add('hidden');
            }
        }

        async function parsePDF(file) {
            const arrayBuffer = await readFileAsArrayBuffer(file);
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let fullText = "";

            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                const pageText = textContent.items.map(item => item.str).join(' ');
                fullText += pageText + "\n\n";
            }
            return fullText;
        }

        async function parseDOCX(file) {
            const arrayBuffer = await readFileAsArrayBuffer(file);
            const result = await mammoth.extractRawText({ arrayBuffer: arrayBuffer });
            return result.value;
        }

        function readFileAsText(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsText(file);
            });
        }

        function readFileAsArrayBuffer(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsArrayBuffer(file);
            });
        }

        // === Editor Utilities ===
        function updateEditor(text) {
            const editor = document.getElementById('editor-area');
            editor.innerText = text;
            updateStats(text);
        }

        function updateStats(text) {
            const tokenCount = document.getElementById('token-count');
            // Rough estimate: 1 token ~= 4 chars (English)
            const tokens = Math.ceil(text.length / 4);
            tokenCount.textContent = tokens.toLocaleString();
        }

        function cleanText() {
            const editor = document.getElementById('editor-area');
            let text = editor.innerText;
            // Normalize whitespace
            text = text.replace(/\r\n/g, '\n');
            // Remove excessive newlines (max 2)
            text = text.replace(/\n{3,}/g, '\n\n');
            // Trim
            text = text.trim();

            updateEditor(text);
            showToast("Formato limpiado", "✨");
        }

        function copyToClipboard() {
            const editor = document.getElementById('editor-area');
            if (!editor.innerText) return;

            navigator.clipboard.writeText(editor.innerText).then(() => {
                showToast("Copiado al portapapeles", "📋");
            }).catch(err => {
                showToast("Error al copiar", "❌");
            });
        }

        function downloadMarkdown() {
            const editor = document.getElementById('editor-area');
            const text = editor.innerText;
            if (!text) {
                showToast("No hay contenido para exportar", "⚠️");
                return;
            }

            const blob = new Blob([text], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = (currentFile.name.split('.')[0] || "document") + "_extracted.md";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast("Descarga iniciada", "⬇️");
        }

        // === Manual Tools ===
        function processContent() {
            const regexInput = document.getElementById('search-prompts').value;
            const editor = document.getElementById('editor-area');
            const matchCount = document.getElementById('match-count');

            if (!regexInput) {
                matchCount.textContent = "0";
                return;
            }

            try {
                const regex = new RegExp(regexInput, 'gi');
                const text = editor.innerText;
                const matches = text.match(regex);

                matchCount.textContent = matches ? matches.length : 0;

                if (matches) {
                    showToast(`Se encontraron ${matches.length} coincidencias`, "🔍");
                } else {
                    showToast("No se encontraron coincidencias", "Ø");
                }
            } catch (e) {
                showToast("Regex inválido", "❌");
            }
        }

        // === AI Logic ===
        async function callGeminiAPI(promptText) {
            if (!apiKey) {
                promptApiKey();
                if (!apiKey) throw new Error("API Key requerida");
            }

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

            const payload = {
                contents: [{
                    parts: [{ text: promptText }]
                }]
            };

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                const errText = await response.text();
                throw new Error(`Error API (${response.status}): ${errText}`);
            }

            const data = await response.json();
            if (data.candidates && data.candidates.length > 0) {
                 return data.candidates[0].content.parts[0].text;
            }
            return "No response from AI.";
        }

        async function handleAIExtract() {
            if (!originalDocContent) {
                showToast("Carga un documento primero", "⚠️");
                return;
            }
            runAIAction("Analizando Documento...", async () => {
                const prompt = `Analiza el siguiente documento y extrae el "System Prompt", las instrucciones principales, o la lógica de negocio subyacente.

                Si es un código, extrae la lógica clave. Si es texto, extrae la intención.

                Documento (Parcial):
                ${originalDocContent.substring(0, 25000)}`;

                const result = await callGeminiAPI(prompt);
                openModal("Análisis de Extracción", result);
            });
        }

        async function handleAIOptimize() {
             const content = document.getElementById('editor-area').innerText;
             if (!content.trim()) return showToast("El editor está vacío", "⚠️");

             runAIAction("Optimizando Prompt...", async () => {
                const prompt = `Actúa como un experto en Prompt Engineering. Optimiza el siguiente prompt para que sea más claro, estructurado y efectivo. Usa técnicas como CO-STAR o Few-Shot si aplica.

                Prompt Original:
                ${content}`;

                const result = await callGeminiAPI(prompt);
                openModal("Prompt Optimizado", result);
            });
        }

        async function handleAICritique() {
             const content = document.getElementById('editor-area').innerText;
             if (!content.trim()) return showToast("El editor está vacío", "⚠️");

             runAIAction("Auditando Prompt...", async () => {
                const prompt = `Realiza una auditoría de seguridad y lógica del siguiente prompt. Busca ambigüedades, posibles alucinaciones y vulnerabilidades de inyección.

                Prompt:
                ${content}`;

                const result = await callGeminiAPI(prompt);
                openModal("Reporte de Auditoría", result);
            });
        }

        async function handleAIGenerateTests() {
             const content = document.getElementById('editor-area').innerText;
             if (!content.trim()) return showToast("El editor está vacío", "⚠️");

             runAIAction("Generando Tests...", async () => {
                const prompt = `Genera una tabla de casos de prueba (Input / Expected Output / Reasoning) para validar el siguiente prompt.

                Prompt:
                ${content}`;

                const result = await callGeminiAPI(prompt);
                openModal("Casos de Prueba Sugeridos", result);
            });
        }

        async function handleAIGenerateFewShot() {
             const content = document.getElementById('editor-area').innerText;
             if (!content.trim()) return showToast("El editor está vacío", "⚠️");

             runAIAction("Generando Ejemplos...", async () => {
                const prompt = `Genera 3 ejemplos "Few-Shot" de alta calidad (Entrada -> Salida ideal) que sirvan para entrenar o guiar al modelo con este prompt.

                Prompt:
                ${content}`;

                const result = await callGeminiAPI(prompt);
                openModal("Ejemplos Few-Shot", result);
            });
        }

        async function runAIAction(loadingMsg, action) {
            const overlay = document.getElementById('loading-overlay');
            const loadingText = document.getElementById('loading-text');

            overlay.classList.remove('hidden');
            loadingText.textContent = loadingMsg;

            try {
                await action();
                showToast("Proceso completado", "✅");
            } catch (err) {
                console.error(err);
                showToast("Error AI: " + err.message, "❌");
            } finally {
                overlay.classList.add('hidden');
            }
        }

        // === Modal Logic ===
        function openModal(title, content) {
            const modal = document.getElementById('ai-modal');
            document.getElementById('modal-title').innerHTML = `<span class="text-2xl">🤖</span> ${title}`;
            // Use marked if available, otherwise plain text
            if (typeof marked !== 'undefined') {
                document.getElementById('modal-content').innerHTML = marked.parse(content);
            } else {
                document.getElementById('modal-content').innerText = content;
            }
            modal.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('ai-modal').classList.add('hidden');
        }

        function copyModalContent() {
            const content = document.getElementById('modal-content').innerText;
            navigator.clipboard.writeText(content).then(() => {
                showToast("Copiado", "📋");
            });
        }

        // === UI Helpers ===
        function showToast(msg, icon) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').textContent = msg;
            document.getElementById('toast-icon').textContent = icon || "✨";

            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        function promptApiKey() {
            const key = prompt("Por favor ingresa tu Google Gemini API Key para habilitar las funciones de IA:");
            if (key) {
                apiKey = key;
                localStorage.setItem('gemini_api_key', key);
                showToast("API Key guardada", "🔑");
            }
        }
    </script>
</body>
</html>
